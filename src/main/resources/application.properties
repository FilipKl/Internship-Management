spring.application.name=Internship-Management
server.port=8081

# Axon Server Configuration
axon.axonserver.servers=localhost:8124
axon.axonserver.enabled=false

# Kafka Producer Configuration (for publishing InternshipJournal events)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.acks=all
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Consumer Configuration (for consuming PartnerManagement events)
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=internship-management-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Swagger UI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
