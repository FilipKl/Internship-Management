version: '3.8'

services:
  # PostgreSQL Database (internal network only)
  internship_db:
    image: postgres:16.1
    container_name: internship_db
    environment:
      POSTGRES_DB: internship_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    # Port not exposed - database accessed only via internal network
    volumes:
      - internship_db_data:/var/lib/postgresql/data
    networks:
      - internship_services_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka broker service (on shared network)
  broker:
    image: apache/kafka:latest
    hostname: broker
    container_name: broker
    ports:
      - "9092:9092"  # Exposed port for local connections
      - "29092:29092" # Internal broker communication
    environment:
      # Kafka broker configuration
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - broker_data:/var/lib/kafka/data
    networks:
      - shared_net
    healthcheck:
      test: kafka-broker-api-versions.sh --bootstrap-server localhost:9092
      interval: 5s
      timeout: 10s
      retries: 5

  # Kafka UI (optional, for visualization and debugging)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:29092
      KAFKA_CLUSTERS_0_JMXPORT: 9101
    depends_on:
      - broker
    networks:
      - shared_net
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # Axon Server for event sourcing and command handling
  axonserver:
    image: axoniq/axonserver:latest-dev
    container_name: axonserver
    ports:
      - "8024:8024"   # Axon Server web UI dashboard
      - "8124:8124"   # Axon Server gRPC port (used by clients)
    environment:
      AXONIQ_AXONSERVER_DEVMODE_ENABLED: "true"
      AXONIQ_AXONSERVER_STANDALONE: "true"
    volumes:
      - axonserver_data:/axonserver/data
    networks:
      - shared_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8024/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Consul Service Registry for service discovery
  consul:
    image: hashicorp/consul:1.18
    container_name: consul
    command: "agent -dev -client=0.0.0.0 -ui"
    ports:
      - "8500:8500"        # HTTP API and UI
      - "8600:8600/udp"    # DNS interface
    networks:
      - shared_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Internship Management Microservice
  internship_app:
    build:
      context: .
    container_name: internship_app
    depends_on:
      - internship_db
      - broker
      - axonserver
      - consul
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://internship_db:5432/internship_management
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:29092
      AXON_AXONSERVER_SERVERS: axonserver:8124
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
    networks:
      - internship_services_net
      - shared_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/swagger-ui.html"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  internship_services_net:
    name: internship_services_net
    driver: bridge
  shared_net:
    name: shared_net
    driver: bridge

volumes:
  internship_db_data:
    driver: local
  broker_data:
    driver: local
  axonserver_data:
    driver: local

